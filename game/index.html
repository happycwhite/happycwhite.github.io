<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>遊戲列表</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 40px;
      color: #e0aaff;
      letter-spacing: 2px;
    }

    .game-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 800px;
    }

    .game-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(224, 170, 255, 0.2);
      border-color: #e0aaff;
    }

    .game-icon {
      font-size: 2.4rem;
    }

    .game-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #e0aaff;
    }

    .game-desc {
      font-size: 0.9rem;
      color: #aaa;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>遊戲列表</h1>
  <div class="game-list">
    <a class="game-card" href="bass-clef.html">
      <div class="game-icon">🎵</div>
      <div class="game-title">低音譜號音符認識</div>
      <div class="game-desc">練習辨認低音譜號上的音符，選擇正確的音名。</div>
    </a>
    <a class="game-card" href="puzzle.html">
      <div class="game-icon">🧩</div>
      <div class="game-title">拼圖遊戲</div>
      <div class="game-desc">把打散的圖片拼回原來的樣子，挑戰你的空間感。</div>
    </a>
  </div>
</body>
</html>
