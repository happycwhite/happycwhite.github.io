<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>遊戲列表</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #fff0f6;
      color: #555;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 40px;
      color: #e91e8c;
      letter-spacing: 2px;
    }

    .game-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 800px;
    }

    .game-card {
      background: #ffffff;
      border: 1px solid #f8bbd0;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(233, 30, 140, 0.08);
    }

    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(233, 30, 140, 0.18);
      border-color: #e91e8c;
    }

    .game-icon {
      font-size: 2.4rem;
    }

    .game-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #e91e8c;
    }

    .game-desc {
      font-size: 0.9rem;
      color: #999;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>遊戲列表</h1>
  <div class="game-list">
    <a class="game-card" href="1a2b.html">
      <div class="game-icon">🔢</div>
      <div class="game-title">1A2B</div>
      <div class="game-desc">猜出隱藏的 4 位不重複數字，A 表示位置正確，B 表示數字存在但位置不對。</div>
    </a>
    <a class="game-card" href="bass-clef.html">
      <div class="game-icon">🎵</div>
      <div class="game-title">低音譜號音符認識</div>
      <div class="game-desc">練習辨認低音譜號上的音符，選擇正確的音名。</div>
    </a>
    <a class="game-card" href="guess-number.html">
      <div class="game-icon">🎯</div>
      <div class="game-title">猜數字</div>
      <div class="game-desc">在 10 次內猜出 1 到 20 的數字，太大太小都會提示。</div>
    </a>
    <a class="game-card" href="puzzle.html">
      <div class="game-icon">🧩</div>
      <div class="game-title">拼圖遊戲</div>
      <div class="game-desc">把打散的圖片拼回原來的樣子，挑戰你的空間感。</div>
    </a>
  </div>
</body>
</html>
